<svg width="1240" height="620" viewBox="0 0 1240 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CTIN architecture and flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0b0d"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="1.1" r="0.8">
      <stop offset="0" stop-color="#ff6b1a" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ffffff"/>
    </marker>
    <marker id="arrowEmber" markerWidth="10" markerHeight="8" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ffd7a8"/>
    </marker>
  </defs>

  <rect width="1240" height="620" fill="url(#bg)"/>
  <rect width="1240" height="620" fill="url(#glow)"/>

  <text x="30" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="#f5f5f4">CTIN Architecture and Flow</text>
  <text x="31" y="78" font-family="'Consolas', monospace" font-size="13" letter-spacing="1" fill="#8a8a92">Treasury Signer to Browser to Frontend to Wallet to confidential contracts to execution</text>

  <g stroke="#ffffff" stroke-width="2" fill="none">
    <line x1="230" y1="170" x2="266" y2="170" marker-end="url(#arrow)"/>
    <line x1="470" y1="170" x2="506" y2="170" marker-end="url(#arrow)"/>
    <line x1="710" y1="170" x2="746" y2="170" marker-end="url(#arrow)"/>
    <line x1="950" y1="170" x2="986" y2="170" marker-end="url(#arrow)"/>
    <line x1="1090" y1="200" x2="1090" y2="376" marker-end="url(#arrow)"/>
    <line x1="990" y1="410" x2="954" y2="410" marker-end="url(#arrow)"/>
    <line x1="750" y1="410" x2="714" y2="410" marker-end="url(#arrow)"/>
    <line x1="510" y1="410" x2="474" y2="410" marker-end="url(#arrow)"/>
    <line x1="270" y1="410" x2="234" y2="410" marker-end="url(#arrow)"/>
    <line x1="850" y1="440" x2="850" y2="486" marker-end="url(#arrow)"/>
  </g>

  <g stroke="#ffd7a8" stroke-width="1.6" stroke-dasharray="5 4" fill="none">
