  <g font-family="'Consolas', monospace" font-size="12">
    <rect x="30" y="580" width="16" height="16" rx="2" fill="#0b0b0d" stroke="#ff6b1a" stroke-width="1.5"/>
    <text x="54" y="592" fill="#8a8a92">Off-chain</text>
    <rect x="170" y="580" width="16" height="16" rx="2" fill="#0b0b0d" stroke="#ffffff" stroke-width="1.5"/>
