  </g>

  <g font-family="'Consolas', monospace" font-size="11" fill="#8a8a92">
    <text x="655" y="292" transform="rotate(37 655 292)">submit encrypted intent</text>
    <text x="1100" y="300">authorize</text>
    <text x="958" y="400">net</text>
    <text x="620" y="400">totals</text>
    <text x="480" y="400">execute</text>
    <text x="862" y="470">selective decrypt</text>
  </g>

