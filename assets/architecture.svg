      <text x="850" y="175" text-anchor="middle">Wallet</text>
    </g>
    <g>
      <rect x="990" y="140" width="200" height="60" rx="4" fill="#0b0b0d" stroke="#ffffff" stroke-width="1.5"/>
      <text x="1090" y="175" text-anchor="middle">Safe</text>
    </g>

    <g>
      <rect x="990" y="380" width="200" height="60" rx="4" fill="#0b0b0d" stroke="#ffffff" stroke-width="1.5"/>
      <text x="1090" y="415" text-anchor="middle">Safe Module</text>
    </g>
    <g>
      <rect x="750" y="380" width="200" height="60" rx="4" fill="#0b0b0d" stroke="#ff6b1a" stroke-width="2.5"/>
      <text x="850" y="406" text-anchor="middle">Intent Network</text>
      <text x="850" y="426" text-anchor="middle" font-size="12" fill="#ffd7a8">Nox confidential</text>
    </g>
    <g>
